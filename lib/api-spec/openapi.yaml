openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: JobGuard AI API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: analyses
    description: Job analysis operations
  - name: feedback
    description: User feedback
  - name: reports
    description: Cybercrime reports
  - name: jobs
    description: Job portal
  - name: applications
    description: Job applications
  - name: insights
    description: Analytics/insights
  - name: admin
    description: Admin operations
  - name: users
    description: User profile

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /analyses:
    get:
      operationId: listAnalyses
      tags: [analyses]
      summary: List user's analyses history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysesList"
    post:
      operationId: createAnalysis
      tags: [analyses]
      summary: Submit a job posting for fraud analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"

  /analyses/stats:
    get:
      operationId: getAnalysisStats
      tags: [analyses]
      summary: Get dashboard statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisStats"

  /analyses/{id}:
    get:
      operationId: getAnalysis
      tags: [analyses]
      summary: Get a specific analysis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analysis"

  /analyses/{id}/feedback:
    post:
      operationId: submitFeedback
      tags: [feedback]
      summary: Submit feedback on an analysis result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feedback"

  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List cybercrime reports
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"
    post:
      operationId: createReport
      tags: [reports]
      summary: Report a fake job to cybercrime portal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List jobs with AI verification status
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [all, verified, suspicious, unknown]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job detail with AI verification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}/apply:
    post:
      operationId: applyForJob
      tags: [jobs]
      summary: Apply for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /jobs/{id}/save:
    post:
      operationId: saveJob
      tags: [jobs]
      summary: Save a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      summary: List user's job applications
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"

  /insights:
    get:
      operationId: getInsights
      tags: [insights]
      summary: Get analytics and insights data
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Insights"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin overview statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/feedback:
    get:
      operationId: listAdminFeedback
      tags: [admin]
      summary: List all feedback for admin
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminFeedbackStats"

  /admin/reports:
    get:
      operationId: listAdminReports
      tags: [admin]
      summary: List all cybercrime reports for admin
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"

  /users/profile:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUserProfile
      tags: [users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterInput:
      type: object
      required: [fullName, email, password]
      properties:
        fullName:
          type: string
        email:
          type: string
        password:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, fullName, email, role, createdAt]
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
        avatarUrl:
          type: ["string", "null"]
        accountStatus:
          type: string
        createdAt:
          type: string

    UserUpdate:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]

    AnalysisInput:
      type: object
      required: [inputType, content]
      properties:
        inputType:
          type: string
          enum: [text, url, image, email]
        content:
          type: string
        jobTitle:
          type: ["string", "null"]

    Analysis:
      type: object
      required: [id, inputType, content, result, confidenceScore, riskLevel, aiExplanation, keyReasons, keywordHighlights, safetyTips, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: ["integer", "null"]
        inputType:
          type: string
        content:
          type: string
        jobTitle:
          type: ["string", "null"]
        result:
          type: string
          enum: [safe, fake, suspicious]
        confidenceScore:
          type: integer
        riskLevel:
          type: string
          enum: [low, medium, high]
        aiExplanation:
          type: string
        keyReasons:
          type: array
          items:
            type: string
        keywordHighlights:
          type: array
          items:
            type: string
        safetyTips:
          type: array
          items:
            type: string
        feedbackGiven:
          type: ["boolean", "null"]
        createdAt:
          type: string

    AnalysesList:
      type: object
      required: [analyses, total]
      properties:
        analyses:
          type: array
          items:
            $ref: "#/components/schemas/Analysis"
        total:
          type: integer

    AnalysisStats:
      type: object
      required: [totalAnalyses, safeJobs, fakeJobs, reports, recentAnalyses, chartData]
      properties:
        totalAnalyses:
          type: integer
        safeJobs:
          type: integer
        fakeJobs:
          type: integer
        reports:
          type: integer
        recentAnalyses:
          type: array
          items:
            $ref: "#/components/schemas/Analysis"
        chartData:
          type: array
          items:
            $ref: "#/components/schemas/ChartPoint"

    ChartPoint:
      type: object
      required: [date, safe, fake]
      properties:
        date:
          type: string
        safe:
          type: integer
        fake:
          type: integer

    FeedbackInput:
      type: object
      required: [isCorrect]
      properties:
        isCorrect:
          type: boolean

    Feedback:
      type: object
      required: [id, analysisId, isCorrect, createdAt]
      properties:
        id:
          type: integer
        analysisId:
          type: integer
        isCorrect:
          type: boolean
        createdAt:
          type: string

    ReportInput:
      type: object
      required: [jobTitle, description]
      properties:
        jobTitle:
          type: string
        description:
          type: string
        analysisId:
          type: ["integer", "null"]

    Report:
      type: object
      required: [id, jobTitle, description, status, createdAt]
      properties:
        id:
          type: integer
        jobTitle:
          type: string
        description:
          type: string
        analysisId:
          type: ["integer", "null"]
        status:
          type: string
          enum: [pending, reviewed, resolved]
        createdAt:
          type: string

    Job:
      type: object
      required: [id, title, company, location, postedAt, verificationStatus, aiScore, description]
      properties:
        id:
          type: integer
        title:
          type: string
        company:
          type: string
        location:
          type: string
        jobType:
          type: string
        salary:
          type: ["string", "null"]
        postedAt:
          type: string
        verificationStatus:
          type: string
          enum: [verified, suspicious, unknown]
        aiScore:
          type: integer
        description:
          type: string
        whyLegitimate:
          type: ["string", "null"]
        isSaved:
          type: boolean

    ApplicationInput:
      type: object
      required: [fullName, email, phone]
      properties:
        fullName:
          type: string
        email:
          type: string
        phone:
          type: string
        resumeFileName:
          type: ["string", "null"]

    Application:
      type: object
      required: [id, jobId, jobTitle, company, status, appliedAt]
      properties:
        id:
          type: integer
        jobId:
          type: integer
        jobTitle:
          type: string
        company:
          type: string
        status:
          type: string
          enum: [under_review, shortlisted, rejected, accepted]
        appliedAt:
          type: string

    Insights:
      type: object
      required: [totalAnalyses, fakePercentage, safePercentage, chartData, recentResults]
      properties:
        totalAnalyses:
          type: integer
        fakePercentage:
          type: number
        safePercentage:
          type: number
        chartData:
          type: array
          items:
            $ref: "#/components/schemas/ChartPoint"
        recentResults:
          type: array
          items:
            $ref: "#/components/schemas/Analysis"

    AdminStats:
      type: object
      required: [totalUsers, totalAnalyses, totalFeedback, totalReports, recentActivity]
      properties:
        totalUsers:
          type: integer
        totalAnalyses:
          type: integer
        totalFeedback:
          type: integer
        totalReports:
          type: integer
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"

    ActivityItem:
      type: object
      required: [type, description, time]
      properties:
        type:
          type: string
        description:
          type: string
        time:
          type: string

    AdminFeedbackStats:
      type: object
      required: [totalFeedback, correct, wrong, correctPercentage, wrongPercentage, chartData, reportedJobs]
      properties:
        totalFeedback:
          type: integer
        correct:
          type: integer
        wrong:
          type: integer
        correctPercentage:
          type: number
        wrongPercentage:
          type: number
        chartData:
          type: array
          items:
            $ref: "#/components/schemas/ChartPoint"
        reportedJobs:
          type: array
          items:
            $ref: "#/components/schemas/Report"
