<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Forgot Password – JobGuard AI</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
      </div>
      <div class="auth-title">Reset Password</div>
      <div class="auth-sub">Enter your email to receive a reset link</div>
    </div>
    {% if success %}
    <div class="alert" style="background:#f0fdf4;border:1.5px solid #86efac;color:#16a34a;padding:14px 16px;border-radius:10px;margin-bottom:16px;font-size:13px;font-weight:600">
      ✅ {{ success }}
    </div>
    {% endif %}
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    {% if not success %}
    <form method="POST" action="/forgot-password">
      <div class="form-group">
        <label>Registered Email Address</label>
        <input type="email" name="email" placeholder="your@email.com" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
        Send Reset Link
      </button>
    </form>
    {% else %}
    <a href="/reset-password/{{ token }}" class="btn btn-primary btn-full btn-lg" style="margin-top:4px;text-align:center;display:block">
      🔑 Click Here to Reset Password
    </a>
    {% endif %}
    <div class="auth-footer"><a href="/login">← Back to Login</a></div>
  </div>
</div>
</body>
</html>
