<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Register – JobGuard AI</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
      </div>
      <div class="auth-title">Create Your Account</div>
      <div class="auth-sub">Join JobGuard AI – Stay Safe, Apply Smart</div>
    </div>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/register">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="full_name" placeholder="John Doe" required value="{{ request.form.get('full_name','') }}">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="john@example.com" required value="{{ request.form.get('email','') }}">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Min 6 characters" required>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">Register</button>
    </form>
    <div class="auth-footer">Already have an account? <a href="/login">Login</a></div>
  </div>
</div>
</body>
</html>
